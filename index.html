<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Lokesh Tewari — Notes from a working physician</title>
<meta name="description" content="Notes from a working physician. MBBS, junior resident, homelab tinkerer.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #111110;
    --fg: #f5f4ed;
    --dim: #8a8a85;
    --dimmer: #5a5a56;
    --accent: #d97757;
    --border: rgba(245, 244, 237, 0.08);
    --border-focus: rgba(245, 244, 237, 0.16);

    --font-display: 'General Sans', -apple-system, sans-serif;
    --font-serif: 'Instrument Serif', Georgia, serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-mono);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  /* subtle grain overlay — paper-like texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px;
  }

  /* top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--dim);
    animation: fadeIn 0.6s ease 0.1s both;
  }

  .monogram { letter-spacing: 0.02em; }

  .login {
    color: var(--dim);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.18s ease;
  }

  .login .arrow {
    display: inline-block;
    transition: transform 0.18s ease;
  }

  .login:hover { color: var(--accent); }
  .login:hover .arrow { transform: translate(2px, -2px); }

  /* hero */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 4vh;
  }

  .name {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(36px, 6vw, 56px);
    letter-spacing: -0.025em;
    color: var(--fg);
    margin-bottom: 6px;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  .subtitle {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: clamp(18px, 2vw, 22px);
    color: var(--dim);
    margin-bottom: 56px;
    animation: fadeUp 0.8s ease 0.35s both;
  }

  /* terminal */
  .terminal {
    width: 100%;
    max-width: 720px;
    height: 340px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color 0.2s ease;
    animation: fadeUp 0.8s ease 0.5s both;
  }

  .terminal.focused { border-color: var(--border-focus); }

  .terminal-header {
    padding: 12px 18px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--dimmer);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.01em;
  }

  .terminal-body {
    flex: 1;
    padding: 16px 18px;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    color: var(--fg);
    overflow-y: auto;
    overflow-x: hidden;
    cursor: text;
  }

  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb {
    background: var(--border-focus);
    border-radius: 3px;
  }

  .line {
    white-space: pre-wrap;
    word-break: break-word;
    animation: lineIn 0.18s ease both;
  }

  .line.dim { color: var(--dim); }
  .line.accent { color: var(--accent); }

  .prompt {
    color: var(--accent);
    margin-right: 8px;
    user-select: none;
  }

  .input-line {
    display: flex;
    align-items: center;
  }

  .input-line input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    caret-color: transparent;
  }

  .caret {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: var(--accent);
    margin-left: -7px;
    vertical-align: middle;
    animation: blink 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  .caret.paused { animation: none; opacity: 1; }

  @keyframes blink {
    0%, 45% { opacity: 1; }
    50%, 95% { opacity: 0; }
    100% { opacity: 1; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes lineIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* mobile */
  @media (max-width: 640px) {
    .page { padding: 20px; }
    .terminal { height: 360px; }
    .subtitle { margin-bottom: 40px; }
    .terminal-body { font-size: 12px; }
  }

  /* hide default focus outlines, we handle them ourselves */
  :focus { outline: none; }
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <span class="monogram">0bsidian-bit</span>
      <a href="https://start.lokeshtewari.uk" target="_blank" rel="noopener noreferrer" class="login">
        login <span class="arrow">↗</span>
      </a>
    </div>

    <div class="hero">
      <h1 class="name">Dr. Lokesh Tewari</h1>
      <p class="subtitle">Notes from a working physician</p>

      <div class="terminal" id="terminal">
        <div class="terminal-header">0bsidian-bit@lokeshtewari.uk</div>
        <div class="terminal-body" id="body">
          <div id="output"></div>
          <div class="input-line">
            <span class="prompt">&gt;</span>
            <input type="text" id="input" autocomplete="off" spellcheck="false" autocapitalize="off">
            <span class="caret" id="caret"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const output = document.getElementById('output');
  const input = document.getElementById('input');
  const body = document.getElementById('body');
  const terminal = document.getElementById('terminal');
  const caret = document.getElementById('caret');

  const history = [];
  let historyIndex = -1;

  const commands = {
    help: `available commands

  /about       who this is
  /now         current focus
  /stack       the homelab
  /contact     how to reach me
  /version     build info
  /clear       clear the screen

type any command and press enter`,

    about: `lokesh tewari. mbbs, junior resident.
rotating through medicine and the blood bank —
learning how the body fails, and how to catch it.

off-hours: usmle step 1 prep, a proxmox homelab,
and an ongoing interest in where medicine, ai,
and security quietly overlap.

based in haldwani, india.`,

    now: `· studying for usmle step 1 · aug 2026
· first aid 2026 + uworld, first pass
· hardening a homelab, one service at a time
· reading: the emperor of all maladies`,

    stack: `proxmox ve on a single node. lxc for everything.
caddy out front, tailscale for the back door,
pocket id + tinyauth handling sso.

media: jellyfin, immich, the usual *arr suspects.
files: wd mycloud nas, smb-mounted into lxcs.

domain: lokeshtewari.uk, via cloudflare.`,

    contact: `email     social@lokeshtewari.uk
github    github.com/0bsidian-bit

for clinical or teaching inquiries,
prefix the subject with [clinical].`,

    version: () => {
      const now = new Date();
      const month = now.toLocaleString('en-us', { month: 'long' }).toLowerCase();
      const year = now.getFullYear();
      return `lokeshtewari.uk  v1.0.0
built      ${month} ${year}
runtime    proxmox lxc, caddy, static
uptime     since the last kernel panic`;
    },

    whoami: `0bsidian-bit. a working physician. and you?`,

    sudo: `permission denied. nice try.`,

    theme: `theme: there is only the void.`,

    exit: {
      text: `there is no exit. only the next patient.`,
      effect: 'pause-caret'
    }
  };

  const commandList = Object.keys(commands).map(c => '/' + c);

  function printLine(text, className = '') {
    const lines = text.split('\n');
    lines.forEach(line => {
      const div = document.createElement('div');
      div.className = 'line' + (className ? ' ' + className : '');
      div.textContent = line || '\u00A0';
      output.appendChild(div);
    });
  }

  function printUserInput(cmd) {
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = '<span class="prompt">&gt;</span>' + escapeHtml(cmd);
    output.appendChild(div);
  }

  function printBlank() {
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = '&nbsp;';
    output.appendChild(div);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function scrollDown() {
    body.scrollTop = body.scrollHeight;
  }

  function clearTerminal() {
    output.innerHTML = '';
  }

  function pauseCaret() {
    caret.classList.add('paused');
    setTimeout(() => caret.classList.remove('paused'), 2000);
  }

  function handleCommand(raw) {
    const cmd = raw.trim().toLowerCase();
    if (!cmd) return;

    printUserInput(raw);

    if (cmd === '/clear' || cmd === 'clear') {
      clearTerminal();
      return;
    }

    const key = cmd.startsWith('/') ? cmd.slice(1) : cmd;
    const entry = commands[key];

    if (entry === undefined) {
      printLine(`command not found: ${cmd}`, 'dim');
      printLine(`type /help for the list`, 'dim');
      printBlank();
      return;
    }

    if (typeof entry === 'string') {
      printLine(entry);
    } else if (typeof entry === 'function') {
      printLine(entry());
    } else if (typeof entry === 'object') {
      printLine(entry.text);
      if (entry.effect === 'pause-caret') pauseCaret();
    }

    printBlank();
  }

  function autocomplete(partial) {
    if (!partial.startsWith('/')) return null;
    const matches = commandList.filter(c => c.startsWith(partial));
    if (matches.length === 1) return matches[0];
    return null;
  }

  // typed boot sequence
  function bootSequence() {
    const bootText = '> welcome. type /help to begin';
    const div = document.createElement('div');
    div.className = 'line';
    output.appendChild(div);

    let i = 0;
    const typeInterval = setInterval(() => {
      if (i >= bootText.length) {
        clearInterval(typeInterval);
        div.textContent = bootText;
        printBlank();
        input.focus();
        return;
      }
      div.textContent = bootText.slice(0, i + 1);
      i++;
    }, 45);
  }

  // event listeners
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = input.value;
      if (val.trim()) {
        history.unshift(val);
        historyIndex = -1;
      }
      handleCommand(val);
      input.value = '';
      scrollDown();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length && historyIndex < history.length - 1) {
        historyIndex++;
        input.value = history[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        input.value = history[historyIndex];
      } else {
        historyIndex = -1;
        input.value = '';
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const completed = autocomplete(input.value.trim());
      if (completed) input.value = completed;
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      clearTerminal();
    }
  });

  // click anywhere in terminal re-focuses input
  terminal.addEventListener('click', () => input.focus());

  // focus ring
  input.addEventListener('focus', () => terminal.classList.add('focused'));
  input.addEventListener('blur', () => terminal.classList.remove('focused'));

  // kick off
  window.addEventListener('load', () => {
    setTimeout(bootSequence, 900);
  });
</script>
</body>
</html>
