<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Lokesh Tewari — Notes from a working physician</title>
<meta name="description" content="Notes from a working physician. MBBS, junior resident, homelab tinkerer.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script src="/app.js" defer></script>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="monogram">
        <span class="monogram-mark">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/>
          </svg>
        </span>
        <span>0bsidian-bit</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
        <a href="https://start.lokeshtewari.uk" target="_blank" rel="noopener noreferrer" class="login">
          login <span class="arrow">↗</span>
        </a>
      </div>
    </div>

    <div class="hero">
      <div class="name-wrap">
        <div class="claude-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1 L13.8 10.2 L23 12 L13.8 13.8 L12 23 L10.2 13.8 L1 12 L10.2 10.2 Z"/>
          </svg>
        </div>
        <h1 class="name">Dr. Lokesh Tewari</h1>
      </div>
      <p class="subtitle">Notes from a working physician</p>

      <div class="terminal" id="terminal">
        <div class="terminal-header">
          <span class="host">0bsidian-bit@lokeshtewari.uk</span>
          <span class="badge">~ · zsh</span>
        </div>
        <div class="terminal-body" id="body">
          <div id="output"></div>
          <div class="input-line">
            <span class="prompt">&gt;</span>
            <input type="text" id="input" name="terminal-command" autocomplete="off" spellcheck="false" autocapitalize="off" autocorrect="off" data-1p-ignore="true" data-lpignore="true" data-form-type="other">
            <span class="caret" id="caret"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      haldwani, india <span>·</span> type /help in the terminal
    </div>
  </div>
</body>
</html>
